name: ci
on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lock-format:
    name: components.lock format (native .myc train)
    runs-on: [self-hosted, linux, x64, podman]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Verify lock format (*-myc only)
        run: |
          set -euo pipefail
          myc_pins=$(grep -cE '^[a-z0-9-]+-myc=[0-9a-f]{40}$' components.lock || true)
          rust_pins=$(grep -cE '^[a-z0-9-]+=[0-9a-f]{40} tree=[0-9a-f]{40}$' components.lock || true)
          echo "myc_pins=$myc_pins rust_tree_pins=$rust_pins"
          test "$myc_pins" -eq 46
          test "$rust_pins" -eq 0
